<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浴室入口</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <script src="https://cdn.jsdelivr.net/npm/blueimp-md5@2.19.0/js/md5.min.js"></script>
</head>

<body>
  <div class="page">
    <section id="login-view" class="login-shell">
      <div class="panel login-card">
        <h1>登录</h1>

        <form id="login-form">
          <div class="field">
            <label for="code">账号</label>
            <input id="code" name="code" type="text" inputmode="numeric" autocomplete="username">
          </div>

          <div class="actions">
            <button class="primary icon-btn" id="submit-btn" type="submit" title="登录" aria-label="登录">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" />
                <path d="M10 17l5-5-5-5M15 12H3" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
          </div>
        </form>

        <div id="login-status" class="status info"></div>
      </div>
    </section>

    <section id="rooms-view" class="hidden">
      <div class="panel rooms-panel">
        <header class="rooms-head">
          <h2 class="rooms-title">浴室预约</h2>
          <div class="toolbar">
            <button class="secondary icon-btn" id="time-format-btn" type="button"
              title="当前24小时制，点击改为12小时制" aria-label="当前24小时制，切换为12小时制">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2" />
                <path d="M12 7v5l3 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </button>
            <button class="secondary icon-btn" id="refresh-btn" type="button" title="刷新列表" aria-label="刷新列表">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M3 3v5h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" />
                <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M16 16h5v5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </button>
            <button class="secondary icon-btn" id="logout-btn" type="button" title="退出登录" aria-label="退出登录">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" />
                <path d="M16 17l5-5-5-5M21 12H9" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
          </div>
        </header>

        <div id="mobile-tabs" class="mobile-tabs"></div>

        <div id="rooms-grid" class="rooms-grid">
          <section class="surface rooms-surface">
            <div class="surface-head">
              <span class="surface-label">房间</span>
              <div id="room-count" class="pill">0 个浴室</div>
            </div>
            <div id="room-list" class="room-list"></div>
          </section>

          <section class="surface slots-surface">
            <div class="surface-head">
              <div class="surface-head-text">
                <span class="surface-label">时段</span>
                <div id="slot-note" class="section-note">请选择一个浴室。</div>
              </div>
              <div id="slot-count" class="pill">0 个时段</div>
            </div>
            <div id="slot-list" class="slot-list"></div>
          </section>
        </div>
      </div>
    </section>
  </div>

  <div id="rooms-status" class="rooms-toast status info" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="app.js" defer></script>
</body>

</html>
