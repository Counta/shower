# Nginx：合并写入 accounts.env（推荐）
# 浏览器只发 JSON 账号列表；认证用 auth_basic；X-Shower-Internal 仅由 Nginx 注入，勿信任公网直连后端端口。
#
# 放入 server { } 后：htpasswd -c /etc/nginx/.htpasswd-shower 你的用户名

location /api/merge-accounts-env {
    auth_basic           "shower-conf";
    auth_basic_user_file /etc/nginx/.htpasswd-shower;
    proxy_pass http://127.0.0.1:8765/api/merge-accounts-env;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Shower-Internal 1;
    proxy_request_buffering off;
    client_max_body_size 32k;
}

# 可选：整文件覆盖（需 SHOWER_CONF_WRITE_TOKEN），一般不必开启
